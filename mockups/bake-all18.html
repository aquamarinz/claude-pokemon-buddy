<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>全 18 只烘焙总览</title>
<style>
  body{margin:0;background:#0e0f12;color:#c9ccbf;font-family:"Courier New",monospace;
       display:flex;flex-direction:column;align-items:center;gap:16px;padding:28px;}
  h1{font-size:17px;color:#9bbc0f;margin:0;}
  .tag{font-size:13px;color:#e23b2d;font-weight:bold;}
  img{image-rendering:pixelated;border:3px solid #3a4049;border-radius:6px;background:#fff;max-width:1020px;width:100%;}

<body>
  <h1>全 18 只 1-bit 烘焙成品 · 设备真实渲染</h1>
  <div class="tag">Dream World 矢量 → 4x 超采样 → 每只自动阈值校准</div>
  <img src="bake-all18.png" alt="18 species baked sprites">
  <div class="hint">
    第 1 行 = 伊布 + 8 个进化型（水/雷/火/太阳/月亮/叶/冰/仙子伊布）<br>
    第 2-3 行 = 御三家三条进化线<br>
    每只标注像素尺寸 + 自动选定阈值。<span class="rec">尾焰、炮管口、花心的纯黑是物种本身的深色特征</span>，非渲染黑团。<br><br>
    逐只看一遍——有想单独调的（某只太深/太细/某部位）现在说；都 OK 我就入库，进 <span class="rec">确认项 ②</span>。
  </div>
