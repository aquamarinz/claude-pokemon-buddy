<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>确认项 ① · 宝可梦 sprite 风格</title>
<style>
  body{margin:0;background:#0e0f12;color:#c9ccbf;font-family:"Courier New",monospace;
       display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px;}
  h1{font-size:17px;letter-spacing:1px;color:#9bbc0f;margin:0;}
  .tag{font-size:13px;color:#e23b2d;font-weight:bold;}
  img{image-rendering:pixelated;border:3px solid #3a4049;border-radius:6px;background:#fff;max-width:940px;width:100%;}
  .hint{font-size:13px;color:#c9ccbf;max-width:760px;text-align:center;line-height:1.8;}

</style>

<body>
  <h1>确认项 ① / 共 8 项 · 宝可梦 sprite 风格</h1>
  <div class="tag">方案：Dream World 矢量插画 → 自动阈值线稿（设备真实 1-bit 渲染）</div>
  <img src="item1-sprites.png" alt="8 只代表性物种 1-bit 线稿">
  <div class="hint">
    覆盖不同体型：圆胖（伊布）· 四足植物（妙蛙种子）· 火蜥（小火龙）· 龟（杰尼龟）·
    大型展翼（喷火龙）· 优雅（太阳伊布）· 暗色体（月亮伊布）· 多部件（水箭龟）。<br>
    每只下方标注实际像素尺寸和自动选定的阈值——<span class="rec">每只单独校准</span>，不是一刀切。<br><br>
    确认这个质量 → 我烘焙全 18 只（17 只 DW + 仙子伊布立绘兜底），逐只过目后入库，再进下一项。
  </div>
